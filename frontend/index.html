<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Faust Live2d</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="overlay">正在初始化 Live2D…</div>
    <input id="modelPath" type="hidden" value="2D/hiyori_pro_zh/hiyori_pro_t11.model3.json" />
    <input id="clickThrough" type="checkbox" hidden checked />
    <input id="modelScaleSlider" type="range" min="0.1" max="2.0" step="0.05" value="0.3" hidden />
    <span id="modelScaleValue" hidden>0.30x</span>
    <input id="audioFile" type="file" accept="audio/*" hidden />
    <textarea id="ttsText" hidden></textarea>
    <select id="ttsLang" hidden>
      <option value="zh" selected>中文</option>
      <option value="en">英文</option>
    </select>
    <button id="loadBtn" hidden>加载模型</button>
    <button id="resetBtn" hidden>重置位置</button>
    <button id="playAudio" hidden>播放</button>
    <button id="stopAudio" hidden>停止</button>
    <button id="ttsBtn" hidden>TTS</button>
    <button id="startAsrBtn" hidden>启动ASR</button>
    <button id="stopAsrBtn" hidden disabled>停止ASR</button>
    <div id="statusDock" aria-hidden="true">
      <span id="asrStatus">未启动</span>
      <span id="chatStatus">聊天未连接</span>
      <span id="ttsStatus">未合成</span>
      <progress id="vadProb" value="0" max="1"></progress>
      <span id="vadProbLabel">0%</span>
    </div>
    <div id="asrText"></div>
    <div id="modelQuickController" aria-label="模型快捷控制器">
      <button id="quickToggleAsr" type="button" title="启动/停止语音识别">
        <span class="qc-icon" aria-hidden="true">🎤</span>
        <span class="qc-label">ASR</span>
      </button>
      <button id="quickStopMedia" type="button" title="停止当前语音或音乐">
        <span class="qc-icon" aria-hidden="true">⏹</span>
        <span class="qc-label">停播</span>
      </button>
      <button id="quickRandomMotion" type="button" title="随机播放动作">
        <span class="qc-icon" aria-hidden="true">✨</span>
        <span class="qc-label">动作</span>
      </button>
      <button id="quickScaleUp" type="button" title="放大模型">
        <span class="qc-icon" aria-hidden="true">＋</span>
        <span class="qc-label">放大</span>
      </button>
      <button id="quickScaleDown" type="button" title="缩小模型">
        <span class="qc-icon" aria-hidden="true">－</span>
        <span class="qc-label">缩小</span>
      </button>
    </div>
  <div id="textChatBar">
    <input id="textChatInput" type="text" placeholder="输入文字与 Faust 对话" />
    <button id="textChatSendBtn">发送</button>
    <span id="textChatStatus">文字待命</span>
  </div>
</div>

      <!-- 引入 Live2D 依赖 -->
    <script src="libs/live2d.min.js"></script>
    <script src="libs/live2dcubismcore.min.js"></script>
    <script src="libs/pixi.min.js"></script>
    <script src="libs/pixi-live2d-display.min.js"></script>
    <script src="libs/pixi-live2d-display-extra.min.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
